services:
  postgres:
    image: postgres:16-alpine
    container_name: zentry_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-zentry_db}
    ports:
      - "5432:5432"
    volumes:
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./Services_frontend
    image: zentry-nginx:local

    container_name: zentry_nginx

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

    volumes:
      - ./certs:/etc/nginx/certs:ro

    networks:
      - app-network

    restart: unless-stopped

  backend:
    build:
      context: ./Services_backend
    image: zentry-backend:local

    container_name: zentry_api

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./Services_backend/.env

    ports:
      - "3000:3000"

    environment:
      PORT: "3000"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    networks:
      - app-network

    restart: unless-stopped

  pgadmin:
    profiles:
      - tools

    image: dpage/pgadmin4:latest

    container_name: pgadmin_web

    env_file:
      - ./Services_backend/.env

    ports:
      - "${PGADMIN_PORT:-8080}:80"

    networks:
      - app-network

    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    name: zentry_app_network
    driver: bridge
