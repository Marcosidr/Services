services:
  nginx:
    build:
      context: ./Services_frontend
    image: zentry-nginx:local

    container_name: zentry_nginx

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "${NGINX_PORT:-80}:80"

    networks:
      - app-network

    restart: unless-stopped

  backend:
    build:
      context: ./Services_backend
    image: zentry-backend:local

    container_name: zentry_api

    env_file:
      - ./Services_backend/.env

    expose:
      - "3000"

    environment:
      PORT: "3000"
      NODE_ENV: production

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    networks:
      - app-network

    restart: unless-stopped

  pgadmin:
    profiles:
      - tools

    image: dpage/pgadmin4:latest

    container_name: pgadmin_web

    env_file:
      - ./Services_backend/.env

    ports:
      - "${PGADMIN_PORT:-8080}:80"

    networks:
      - app-network

    restart: unless-stopped

networks:
  app-network:
    name: zentry_app_network
    driver: bridge
