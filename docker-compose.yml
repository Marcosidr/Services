services:
  app:
    build:
      context: ./Services_backend

    container_name: zentry_api

    env_file:
      - ./Services_backend/.env

    ports:
      - '3000:3000'

    environment:
      PORT: 3000
      NODE_ENV: production

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest

    container_name: pgadmin_web

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - '8080:80'

    restart: unless-stopped
